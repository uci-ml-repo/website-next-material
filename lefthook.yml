pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{ts,tsx,json,css}"
      run: pnpm biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

    prettier:
      glob: "{package.json,*.yml,*.yaml}"
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}
